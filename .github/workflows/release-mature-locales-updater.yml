name: Release mature locales (Weblate) updater
on:
  workflow_dispatch:
  schedule:
    # 05:00 UTC on the 1st of each month
    - cron: "0 5 1 * *"
env:
  python_version: '3.14'

permissions:
  contents: read

jobs:
  update:
    name: Sync release locale list with Weblate
    runs-on: ubuntu-24.04
    environment:
      name: release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            pypi.org:443
            github.com:443
            api.github.com:443
            *.githubusercontent.com:443
            hosted.weblate.org:443
            ghcr.io
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.python_version }}
      - name: Use Python Dependency Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}-release-locale-updater
      - name: Install Poetry
        run: python${{ env.python_version }} -m pip install --constraint=.github/github-requirements.txt poetry
      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true
      - name: Install poethepoet
        run: poetry install --no-interaction --no-root --only automation
      - name: Regenerate po/release_mature_locales.json
        run: poetry run poe release-mature-locales-update
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.GAPHOR_UPDATER_APP_ID }}
          private-key: ${{ secrets.GAPHOR_UPDATER_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: Update Weblate mature release locale list
          branch: weblate-mature-locales-update
          delete-branch: true
          title: "Update Weblate mature release locale list"
          body: |
            This PR was automatically created to make the following update:
            - Refresh `po/release_mature_locales.json` from Hosted Weblate
          labels: |
            skip-changelog
          # Only open a PR if po/release_mature_locales.json changed; otherwise this step
          # exits successfully without a PR.
          add-paths: |
            po/release_mature_locales.json
