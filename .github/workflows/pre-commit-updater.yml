name: Pre-commit updater
on:
  workflow_dispatch:
  schedule:
    # min hour dom month dow
    - cron:  '0 5 * * 3'
env:
  python_version: '3.14'

permissions:
  contents: read

jobs:

  updater:
    name: Update
    runs-on: ubuntu-24.04
    environment:
      name: release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            files.pythonhosted.org:443
            pypi.org:443
            github.com:443
            api.github.com:443
            *.githubusercontent.com:443
            ghcr.io
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.python_version }}
      - name: Use Python Dependency Cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-precommit
      - name: Install pre-commit
        run: python -m pip install pre-commit
      - name: Update pre-commit hooks
        run: pre-commit autoupdate --freeze
      - name: Run pre-commit hooks
        run: pre-commit run --all-files
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.GAPHOR_UPDATER_APP_ID }}
          private-key: ${{ secrets.GAPHOR_UPDATER_APP_PRIVATE_KEY }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: Update pre-commit hooks
          branch: pre-commit-update
          delete-branch: true
          title: 'Update pre-commit hooks'
          body: |
            This PR was automatically created to make the following update:
            - Update pre-commit hooks
          labels: |
            skip-changelog
